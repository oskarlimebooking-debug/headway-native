name: Build Unsigned IPA

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Release
          - Debug
  push:
    branches:
      - main
    paths:
      - 'ios/**'
  pull_request:
    branches:
      - main
    paths:
      - 'ios/**'

env:
  SCHEME: ChapterWise
  PROJECT_DIR: ios/ChapterWise
  XCODE_VERSION: '16.2'

jobs:
  build-unsigned-ipa:
    name: Build Unsigned IPA
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install dependencies
        run: |
          brew install xcodegen
          gem install xcpretty

      - name: Generate Xcode project
        working-directory: ${{ env.PROJECT_DIR }}
        run: xcodegen generate

      - name: List available schemes
        working-directory: ${{ env.PROJECT_DIR }}
        run: xcodebuild -project ${{ env.SCHEME }}.xcodeproj -list

      - name: Build archive (unsigned)
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          set -o pipefail

          CONFIGURATION="${{ github.event.inputs.configuration || 'Release' }}"

          xcodebuild archive \
            -project ${{ env.SCHEME }}.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -configuration "$CONFIGURATION" \
            -archivePath ${{ runner.temp }}/${{ env.SCHEME }}.xcarchive \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            | xcpretty --color

          echo "Archive created successfully"
          ls -la "${{ runner.temp }}/${{ env.SCHEME }}.xcarchive/Products/Applications/"

      - name: Create unsigned IPA
        run: |
          ARCHIVE_PATH="${{ runner.temp }}/${{ env.SCHEME }}.xcarchive"
          IPA_DIR="${{ runner.temp }}/ipa"
          PAYLOAD_DIR="${IPA_DIR}/Payload"

          mkdir -p "${PAYLOAD_DIR}"

          # Copy the .app bundle into Payload directory
          cp -r "${ARCHIVE_PATH}/Products/Applications/${{ env.SCHEME }}.app" "${PAYLOAD_DIR}/"

          # Create the IPA (which is just a zip of the Payload directory)
          cd "${IPA_DIR}"
          zip -r "${{ runner.temp }}/${{ env.SCHEME }}-unsigned.ipa" Payload

          echo "IPA created successfully"
          ls -lh "${{ runner.temp }}/${{ env.SCHEME }}-unsigned.ipa"

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SCHEME }}-unsigned-ipa
          path: ${{ runner.temp }}/${{ env.SCHEME }}-unsigned.ipa
          retention-days: 14
          if-no-files-found: error
