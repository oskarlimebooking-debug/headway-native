name: Build iOS App

on:
  push:
    branches: [main, master]
    paths:
      - 'ios/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'ios/**'
  workflow_dispatch:

jobs:
  build:
    name: Build ChapterWise IPA
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          cd ios/ChapterWise
          xcodegen generate

      - name: Archive for iOS device
        run: |
          cd ios/ChapterWise
          xcodebuild archive \
            -project ChapterWise.xcodeproj \
            -scheme ChapterWise \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -archivePath $RUNNER_TEMP/ChapterWise.xcarchive \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Create IPA from archive
        run: |
          mkdir -p $RUNNER_TEMP/Payload
          cp -R $RUNNER_TEMP/ChapterWise.xcarchive/Products/Applications/ChapterWise.app $RUNNER_TEMP/Payload/
          cd $RUNNER_TEMP
          zip -r ChapterWise.ipa Payload
          echo "IPA size: $(du -h ChapterWise.ipa | cut -f1)"

      - name: Prepare artifact
        run: |
          mkdir -p artifact
          cp $RUNNER_TEMP/ChapterWise.ipa artifact/
          echo "Build completed at $(date)" > artifact/BUILD_INFO.txt
          echo "Unsigned IPA - use AltStore, Sideloadly, or similar to install." >> artifact/BUILD_INFO.txt

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChapterWise-ipa
          path: artifact/
          retention-days: 30
